name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check_doc_budget self-test
        run: python tools/check_doc_budget.py --self-test
      - name: check_md_routing self-test
        run: python tools/check_md_routing.py --self-test
